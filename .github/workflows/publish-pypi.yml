name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish. For this release this must be 0.6.6."
        required: true
        type: string
      expected_sha:
        description: "Exact main commit SHA selected for the release."
        required: true
        type: string
      confirm_pypi_publish:
        description: "Type: publish unlimited-skills 0.6.6 to PyPI"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  publish:
    name: Publish and verify unlimited-skills 0.6.6
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/unlimited-skills/
    steps:
      - name: Checkout selected release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.expected_sha }}
          fetch-depth: 0

      - name: Validate manual release inputs
        run: |
          test "${{ github.event.inputs.version }}" = "0.6.6"
          test "${{ github.event.inputs.confirm_pypi_publish }}" = "publish unlimited-skills 0.6.6 to PyPI"
          test "$(git rev-parse HEAD)" = "${{ github.event.inputs.expected_sha }}"
          git fetch origin main
          test "$(git rev-parse origin/main)" = "${{ github.event.inputs.expected_sha }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Run v0.6.6 product precision verifier
        run: |
          python scripts/verify-v066-product-polish.py \
            --expected-sha "${{ github.event.inputs.expected_sha }}" \
            --json

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Test the exact release artifacts and PyPI upgrade path
        run: python scripts/run-v065-alpha-package-smoke.py --expected-version 0.6.6 --dist-dir dist --json

      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      - name: Verify exact public PyPI wheel
        run: python scripts/verify-pypi-publication.py --version 0.6.6 --dist-dir dist --wait-seconds 300 --json

      - name: Create matching GitHub release after PyPI verification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v0.6.6" >/dev/null 2>&1; then
            test "$(gh release view "v0.6.6" --json targetCommitish --jq .targetCommitish)" = "${{ github.event.inputs.expected_sha }}"
          else
            gh release create "v0.6.6" \
              --target "${{ github.event.inputs.expected_sha }}" \
              --title "v0.6.6 — Product Precision & Release Truth" \
              --notes-file docs/releases/v0.6.6-plan.md
          fi
